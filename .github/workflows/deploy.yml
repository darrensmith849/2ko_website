name: Deploy to Cloudflare

# Auto-deploy the site to the Cloudflare Worker (2ko-website) on every
# push to main. Builds with OpenNext, then deploys via wrangler.
#
# Requires one repository secret:
#   CLOUDFLARE_API_TOKEN  — a Cloudflare API token with the
#     "Edit Cloudflare Workers" permissions (Workers Scripts: Edit,
#     Workers KV: Edit, Account/Workers R2: Edit, Workers Routes: Edit).
#   Add via:  gh secret set CLOUDFLARE_API_TOKEN   (or the repo Settings → Secrets UI)
#
# The account id below is not sensitive; the token above is what grants access.
# Worker runtime secrets (e.g. BREVO_API_KEY) are set once with
# `wrangler secret put` and persist across deploys — they are NOT needed here.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & deploy (OpenNext → Cloudflare Workers)
        run: npm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ae8f56630096e47f2367300786606f92
